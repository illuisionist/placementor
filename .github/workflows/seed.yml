name: Seed Pinecone Knowledge Base

on:
  workflow_dispatch:   # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'backend/knowledge_base/**'   # Auto-trigger when KB files change

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal seed dependencies
        run: |
          pip install pinecone google-genai loguru python-dotenv -q

      - name: Run seed script
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX:   ${{ secrets.PINECONE_INDEX }}
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
        run: python seed_knowledge_base.py
