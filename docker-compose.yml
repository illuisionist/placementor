version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: placementor_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-placementor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-placementor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-placementor_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placementor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: placementor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: placementor_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placementor_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql://placementor:placementor_secret@postgres:5432/placementor_db
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./knowledge_base:/app/knowledge_base
      - resume_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placementor_celery
    environment:
      - POSTGRES_URL=postgresql://placementor:placementor_secret@postgres:5432/placementor_db
      - REDIS_URL=redis://redis:6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    command: celery -A tasks.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  resume_uploads:
