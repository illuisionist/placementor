render:
  services:
    - type: web
      name: placementor-api
      runtime: python
      rootDir: backend
      buildCommand: pip install -r requirements.txt
      startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
      plan: free
      envVars:
        - key: POSTGRES_URL
          sync: false          # Set in Render dashboard from Neon
        - key: REDIS_URL
          sync: false          # Set in Render dashboard from Upstash
        - key: PINECONE_API_KEY
          sync: false
        - key: PINECONE_INDEX
          value: placementor
        - key: GROQ_API_KEY
          sync: false
        - key: GOOGLE_API_KEY
          sync: false
        - key: SECRET_KEY
          generateValue: true
        - key: DEBUG
          value: "false"
